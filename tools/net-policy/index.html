<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>网络策略聚合工具</title>
<link rel="manifest" href="../../manifest.webmanifest">
<meta name="theme-color" content="#2563a8">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="工具箱">
<link rel="icon" href="../../icons/icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="../../icons/icon-192.png">
<link rel="stylesheet" href="../../shared/css/common.css">
<link rel="stylesheet" href="css/tool.css">
</head>
<body>

<header class="site-header">
  <div>
    <h1>网络策略聚合工具</h1>
    <p>IPv4 / IPv6 网段聚合，按端口分组或单行压缩，支持 xlsx 导出</p>
  </div>
  <a class="header-back" href="../../index.html">← 返回工具箱</a>
</header>

<div class="page-main tool-main">

  <div class="settings-bar">

    <div class="setting-group">
      <label>IPv4 聚合前缀（/0–32）</label>
      <input type="number" id="agg-mask" value="24" min="0" max="32" title="32 = 不聚合">
    </div>

    <div class="setting-group">
      <label>IPv6 聚合前缀（/0–128）</label>
      <input type="number" id="agg-mask6" value="64" min="0" max="128" title="128 = 不聚合">
    </div>

    <div class="settings-divider"></div>

    <div class="setting-group">
      <label>地址连接符</label>
      <select id="sep-preset">
        <option value="\n">换行符</option>
        <option value=";">分号</option>
        <option value=",">逗号</option>
        <option value=" ">空格</option>
        <option value="custom">自定义…</option>
      </select>
    </div>

    <div class="setting-group" id="sep-custom-group" style="display:none">
      <label>自定义地址连接符</label>
      <input type="text" id="sep-custom" placeholder="如 | 等">
    </div>

    <div class="setting-group">
      <label>端口连接符</label>
      <select id="port-sep-preset">
        <option value="\n">换行符</option>
        <option value=";">分号</option>
        <option value=",">逗号</option>
        <option value=" ">空格</option>
        <option value="custom">自定义…</option>
      </select>
    </div>

    <div class="setting-group" id="port-sep-custom-group" style="display:none">
      <label>自定义端口连接符</label>
      <input type="text" id="port-sep-custom" placeholder="自定义">
    </div>

    <div class="settings-divider"></div>

    <div class="setting-group">
      <label>单条最大地址数（0=不限）</label>
      <input type="number" id="max-addr" value="0" min="0">
    </div>

    <div class="setting-group">
      <label>输出模式</label>
      <select id="output-mode">
        <option value="by-port">按端口分组</option>
        <option value="one-line">全部压缩为一行</option>
      </select>
    </div>

    <div class="setting-group" style="margin-left:auto">
      <label>&nbsp;</label>
      <button class="btn btn-primary" onclick="NetPolicyApp.doProcess()">▶ 开始聚合</button>
    </div>

  </div>

  <div class="panel">
    <div class="panel-header">
      <h2>输入数据</h2>
      <div class="btn-row">
        <button class="btn btn-outline" onclick="NetPolicyApp.loadSample()">加载示例</button>
        <button class="btn btn-danger"  onclick="NetPolicyApp.clearInput()">清空</button>
      </div>
    </div>
    <div class="panel-body">
      <div style="font-size:.8rem;color:#888;line-height:1.6">
        每行一条记录，格式：<code>IP/CIDR&nbsp;&nbsp;端口</code>，列分隔符支持空格、Tab、逗号。<br>
        IPv4 和 IPv6（含 <code>::</code> 压缩形式、CIDR）均支持；端口支持 <code>80</code>、<code>8080-8090</code>、<code>tcp/443</code>。
      </div>
      <textarea id="input-area" placeholder="例如：&#10;10.1.1.5    80&#10;2409:8c00::1  443"></textarea>
      <div class="error-box" id="error-box"></div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-header">
      <h2>聚合结果</h2>
      <div class="btn-row">
        <span class="stat-badge" id="stat-badge">—</span>
        <button class="btn btn-outline" onclick="NetPolicyApp.copyResult()">复制全部</button>
        <button class="btn btn-success" onclick="NetPolicyApp.exportXlsx()">导出 xlsx</button>
      </div>
    </div>
    <div class="panel-body" style="padding:0">
      <div class="result-scroll">
        <table id="result-table">
          <thead>
            <tr>
              <th>目标地址</th>
              <th>端口/服务</th>
              <th>地址数</th>
            </tr>
          </thead>
          <tbody id="result-body">
            <tr><td colspan="3"><span class="empty-hint">请在左侧输入数据，点击「开始聚合」</span></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

</div>

<footer class="site-footer">
  工具箱 · 纯静态前端 · 数据不出浏览器<br>
  <a href="https://github.com/cnzhanglu/webtools" target="_blank" rel="noopener noreferrer">离线文件下载 GitHub</a>
</footer>

<script src="../../shared/js/utils.js"></script>
<script src="../../shared/js/xlsx.js"></script>
<script src="js/ip.js"></script>
<script src="js/process.js"></script>
<script src="js/app.js"></script>
<script src="../../shared/js/pwa.js"></script>
</body>
</html>
