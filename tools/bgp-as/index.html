<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BGP AS 号格式转换</title>
<link rel="manifest" href="../../manifest.webmanifest">
<meta name="theme-color" content="#2563a8">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="工具箱">
<link rel="icon" href="../../icons/icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="../../icons/icon-192.png">
<link rel="stylesheet" href="../../shared/css/common.css">
<link rel="stylesheet" href="css/tool.css">
</head>
<body>

<header class="site-header">
  <div>
    <h1>BGP AS 号格式转换</h1>
    <p>十进制 ↔ 带点格式（ASDOT）互转，支持 2 字节 / 4 字节 AS 号批量处理</p>
  </div>
  <a class="header-back" href="../../index.html">← 返回工具箱</a>
</header>

<div class="page-main as-main">

  <div class="settings-bar">
    <div class="setting-group">
      <label for="asdot-mode">显示模式</label>
      <select id="asdot-mode">
        <option value="asdotplus">ASDOT+（≥65536 才显示点格式）</option>
        <option value="asdot">ASDOT（全部显示点格式 X.Y）</option>
      </select>
    </div>
    <div class="setting-group" style="flex:1">
      <label>说明</label>
      <div class="hint-text">
        每行输入一个 AS 号，支持十进制（<code>65536</code>）或带点格式（<code>1.0</code>）。空行与 <code>#</code> 注释行自动跳过，自动识别格式并双向转换。
      </div>
    </div>
    <div class="setting-group" style="margin-left:auto">
      <label>&nbsp;</label>
      <button class="btn btn-primary" onclick="BgpAsApp.doConvert()">▶ 转换</button>
    </div>
  </div>

  <div class="panel">
    <div class="panel-header">
      <h2>输入（混合格式）</h2>
      <div class="btn-row">
        <button class="btn btn-outline" onclick="BgpAsApp.loadSample()">加载示例</button>
        <button class="btn btn-danger" onclick="BgpAsApp.clearInput()">清空</button>
      </div>
    </div>
    <div class="panel-body">
      <textarea id="input-area" placeholder="每行一个 AS 号，如：&#10;65536&#10;1.0&#10;4200000000&#10;131072&#10;2.0"></textarea>
      <div class="error-box" id="error-box"></div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-header">
      <h2>转换结果</h2>
      <div class="btn-row">
        <span class="stat-badge" id="stat-badge">—</span>
        <button class="btn btn-outline" onclick="BgpAsApp.copyResult()">复制结果</button>
      </div>
    </div>
    <div class="panel-body" style="padding:0">
      <div class="result-scroll">
        <table>
          <thead>
            <tr>
              <th>行号</th>
              <th>原始输入</th>
              <th>十进制</th>
              <th>ASDOT（X.Y）</th>
              <th>类型</th>
              <th>说明</th>
            </tr>
          </thead>
          <tbody id="result-body">
            <tr><td colspan="6"><span class="empty-hint">输入 AS 号后点击「转换」</span></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

</div>

<footer class="site-footer">
  工具箱 · 纯静态前端 · 数据不出浏览器<br>
  <a href="https://github.com/cnzhanglu/webtools" target="_blank" rel="noopener noreferrer">离线文件下载 GitHub</a>
</footer>

<script src="../../shared/js/utils.js"></script>
<script src="js/app.js"></script>
<script src="../../shared/js/pwa.js"></script>
</body>
</html>
