<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Base64 编解码工具</title>
<link rel="manifest" href="../../manifest.webmanifest">
<meta name="theme-color" content="#2563a8">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="工具箱">
<link rel="icon" href="../../icons/icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="../../icons/icon-192.png">
<link rel="stylesheet" href="../../shared/css/common.css">
<link rel="stylesheet" href="css/tool.css">
</head>
<body>

<header class="site-header">
  <div>
    <h1>Base64 编解码工具</h1>
    <p>文本编解码 · 文件编码（支持 5 MB 以上大文件）· 下载为 .txt · Base64 还原文件</p>
  </div>
  <a class="header-back" href="../../index.html">← 返回工具箱</a>
</header>

<div class="page-main b64-main">

  <div class="tab-bar">
    <button class="tab-btn active" data-tab="text">📝 文本编解码</button>
    <button class="tab-btn" data-tab="file-enc">📦 文件 → Base64</button>
    <button class="tab-btn" data-tab="file-dec">📂 Base64 → 文件</button>
  </div>

  <!-- 文本模式 -->
  <div class="tab-pane active" id="tab-text">
    <div class="two-col">
      <div class="panel">
        <div class="panel-header">
          <h2>输入</h2>
          <div class="btn-row">
            <button class="btn btn-primary" onclick="Base64App.textEncode()">编码 →</button>
            <button class="btn btn-outline" onclick="Base64App.textDecode()">← 解码</button>
            <button class="btn btn-outline" onclick="Base64App.textSwap()">⇅ 交换</button>
            <button class="btn btn-danger" onclick="Base64App.clearText()">清空</button>
          </div>
        </div>
        <div class="panel-body">
          <textarea id="text-input" placeholder="输入文本或 Base64 字符串…"></textarea>
        </div>
      </div>
      <div class="panel">
        <div class="panel-header">
          <h2>输出</h2>
          <div class="btn-row">
            <span class="stat-badge" id="text-stat"></span>
            <button class="btn btn-outline" onclick="Base64App.copyText('text-output')">复制</button>
          </div>
        </div>
        <div class="panel-body">
          <textarea id="text-output" placeholder="结果显示在这里…" readonly></textarea>
        </div>
      </div>
    </div>
  </div>

  <!-- 文件编码模式 -->
  <div class="tab-pane" id="tab-file-enc">
    <div class="panel">
      <div class="panel-header">
        <h2>文件 → Base64</h2>
        <div class="btn-row">
          <button class="btn btn-outline" onclick="Base64App.triggerFileLoad()">选择文件</button>
          <button class="btn btn-primary" id="btn-encode-file" onclick="Base64App.encodeFile()" disabled>编码</button>
          <button class="btn btn-success" id="btn-save-b64" onclick="Base64App.saveB64AsTxt()" disabled>下载 .txt</button>
        </div>
      </div>
      <div class="panel-body">
        <div class="file-info-box">
          <div id="file-status-1" class="file-status-main">尚未选择文件</div>
          <div id="file-status-2" class="file-status-sub"></div>
        </div>
        <textarea id="file-b64-output" class="mono-output" placeholder="编码结果显示在这里…" readonly></textarea>
        <input type="file" id="file-input" hidden>
      </div>
    </div>
  </div>

  <!-- Base64 解码为文件 -->
  <div class="tab-pane" id="tab-file-dec">
    <div class="panel">
      <div class="panel-header">
        <h2>Base64 → 还原文件</h2>
        <div class="btn-row">
          <button class="btn btn-outline" onclick="Base64App.triggerB64Load()">从文件加载 Base64</button>
          <button class="btn btn-success" onclick="Base64App.decodeToFile()">解码并下载</button>
        </div>
      </div>
      <div class="panel-body">
        <div class="filename-row">
          <label>保存文件名：</label>
          <input type="text" id="b64decode-filename" placeholder="例如：output.bin" class="filename-input">
          <span id="b64decode-stat" class="stat-badge" style="margin-left:8px"></span>
        </div>
        <textarea id="b64decode-input" placeholder="粘贴 Base64 内容，或点击「从文件加载」…"></textarea>
        <input type="file" id="b64decode-file-input" accept=".txt,.b64,.base64,text/*" hidden>
      </div>
    </div>
  </div>

</div>

<script src="../../shared/js/utils.js"></script>
<script src="js/app.js"></script>
<script src="../../shared/js/pwa.js"></script>
</body>
</html>
